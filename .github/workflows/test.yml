name: Tests
on: [push, pull_request]
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.10'
      - name: Install requirements
        run: pip install flake8 pycodestyle
      - name: Check syntax
        run: flake8 . --count --select=E901,E999,F821,F822,F823 --show-source --statistics --exclude ckan

  # Il job 'test' e' stato rimosso: questo fork (import di ckan/ckanext-geoview
  # v0.0.19) non include la cartella ckanext/geoview/tests, quindi pytest usciva
  # con exit 4 ("file or directory not found: ckanext/geoview/tests").
  # Le patch net7 sono lato JS/CSS (ol_preview.js/.css). Se in futuro si
  # importeranno i test da upstream, ripristinare qui il job 'test'.
